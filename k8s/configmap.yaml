apiVersion: v1
kind: ConfigMap
metadata:
  name: contact-directory-config
  namespace: contact-directory
data:
  ENVIRONMENT: "production"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "contact_directory"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"
  JWT_REFRESH_EXPIRE_DAYS: "7"
  LOG_LEVEL: "INFO"
  ALLOWED_ORIGINS: "https://contactos.local"
  AZURE_REDIRECT_URI: "https://contactos.local/auth/callback"
  FRONTEND_URL: "https://contactos.local"
  UPLOAD_DIR: "/app/uploads"
  UPLOAD_MAX_SIZE_MB: "10"
