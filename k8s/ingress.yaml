---
# Middleware: reescribe /auth/X → /api/auth/X para el callback de Azure AD
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: auth-rewrite
  namespace: contact-directory
spec:
  replacePathRegex:
    regex: ^/auth/(.*)
    replacement: /api/auth/$1
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: contact-directory
  namespace: contact-directory
spec:
  entryPoints:
    - websecure
  routes:
    # API del backend (pass-through)
    - match: Host(`contactos.local`) && PathPrefix(`/api/`)
      kind: Rule
      services:
        - name: backend-service
          port: 8000

    # Callback de Azure AD: /auth/ → /api/auth/
    - match: Host(`contactos.local`) && PathPrefix(`/auth/`)
      kind: Rule
      middlewares:
        - name: auth-rewrite
      services:
        - name: backend-service
          port: 8000

    # Probes de liveness/readiness
    - match: Host(`contactos.local`) && (Path(`/health`) || Path(`/ready`))
      kind: Rule
      services:
        - name: backend-service
          port: 8000

    # Frontend SPA (todo lo demás)
    - match: Host(`contactos.local`)
      kind: Rule
      services:
        - name: frontend-service
          port: 80
