apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrate
  namespace: contact-directory
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: mrgonzalez/contact-backend:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: contact-directory-config
            - secretRef:
                name: contact-directory-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
  backoffLimit: 3
